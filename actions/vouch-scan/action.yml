name: Vouch leak & secret scan
description: Scan a repository for leaked private key material and common provider secrets, and fail the check when any is found.
author: Vouch Protocol
branding:
  icon: shield
  color: green

inputs:
  path:
    description: Path to scan.
    required: false
    default: "."
  severity:
    description: Fail when a finding is at or above this severity (critical, high, medium, low).
    required: false
    default: critical
  secrets:
    description: >-
      Also scan for common provider secrets (AWS, GitHub, GitLab, Slack, Google,
      Stripe, SendGrid, npm, OpenAI, Anthropic keys and PEM private keys), not
      just Vouch-shaped key material. Set to "true" to enable.
    required: false
    default: "false"
  version:
    description: Version of vouch-protocol to install (default latest).
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
    - name: Install Vouch
      shell: bash
      run: |
        if [ -n "${{ inputs.version }}" ]; then
          pip install "vouch-protocol==${{ inputs.version }}"
        else
          pip install vouch-protocol
        fi
    - name: Scan for leaked key material and secrets
      shell: bash
      run: |
        SECRETS_FLAG=""
        if [ "${{ inputs.secrets }}" = "true" ]; then
          SECRETS_FLAG="--secrets"
        fi
        vouch scan "${{ inputs.path }}" $SECRETS_FLAG --exit-nonzero-on "${{ inputs.severity }}"
