name: Deploy Website

# Auto-builds the Next.js site in website/ and commits the static output
# into docs/ so GitHub Pages serves it from main:/docs.
#
# Trigger only on changes inside website/. Commits to docs/ from this
# workflow do NOT re-trigger it because docs/** is not in the paths filter.

on:
  push:
    branches: [main]
    paths:
      - 'website/**'
      - '.github/workflows/deploy-website.yml'
  workflow_dispatch:

# Allow the workflow to push commits back to the repository.
permissions:
  contents: write

# If a new push comes in while one is running, cancel the in-flight job
# so the latest version is the one that ships.
concurrency:
  group: deploy-website
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          # Need full history so the commit-back step has a clean base
          fetch-depth: 0
          # Use a token that allows pushing back
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies
        working-directory: website
        run: npm ci --no-audit --no-fund

      - name: Build static export
        working-directory: website
        env:
          # Public URL of the deployed Vouch Assistant backend. When unset
          # (or pointed at localhost), AgentPanel.tsx renders a "coming soon"
          # body and never tries to fetch. Set the GitHub repo variable
          # VOUCH_AGENT_URL to https://agent.vouch-protocol.com once the
          # Fly deploy is live (Settings > Secrets and variables > Actions > Variables).
          NEXT_PUBLIC_VOUCH_AGENT_URL: ${{ vars.VOUCH_AGENT_URL }}
        run: npm run build

      - name: Copy output into docs/
        run: |
          # Preserve existing static pages, blog/, disclosures/, etc.
          # Next.js output is merged on top (overwrites overlapping files).
          cp -rv website/out/. docs/

      - name: Detect changes
        id: detect
        run: |
          if [ -z "$(git status --porcelain docs/)" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No changes in docs/, skipping commit."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Changes detected in docs/:"
            git status --short docs/
          fi

      - name: Commit and push to main
        if: steps.detect.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/
          git commit -m "ci(website): deploy static export from ${GITHUB_SHA::7}

          Automated deploy by .github/workflows/deploy-website.yml.
          Triggered by commit ${GITHUB_SHA}.

          [skip ci]"
          # Push with rebase-and-retry. A concurrent merge to main moves the
          # branch between checkout and push and would otherwise reject this
          # push as non-fast-forward, silently leaving the live site stale.
          # The deploy commit only touches generated docs/ output, so replaying
          # it onto the latest main is a clean, conflict-free rebase.
          pushed=
          for attempt in 1 2 3 4 5; do
            if git push origin main; then
              echo "Pushed deploy commit on attempt ${attempt}."
              pushed=1
              break
            fi
            echo "Push rejected on attempt ${attempt}; rebasing onto latest main and retrying."
            git pull --rebase origin main
            sleep $((attempt * 3))
          done
          if [ -z "${pushed}" ]; then
            echo "Failed to push the deploy commit after 5 attempts."
            exit 1
          fi

      - name: Summary
        run: |
          echo "## Website deploy" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.detect.outputs.changed }}" = "true" ]; then
            echo "✓ Static export refreshed and committed to docs/." >> $GITHUB_STEP_SUMMARY
            echo "GitHub Pages will redeploy from main:/docs in 1-2 minutes." >> $GITHUB_STEP_SUMMARY
          else
            echo "No content changes detected. docs/ already up to date." >> $GITHUB_STEP_SUMMARY
          fi
