name: Verified Contributor credential

# When a contributor's pull request is merged, mint a signed Vouch Verified
# Contributor credential for that contribution, publish a certificate page at
# /c/<login>/<pr>/, list them on /contributors, and post a congratulatory
# comment linking to the certificate. One certificate per merged PR.
#
# The credited contributor is the author of the pull request's commits, meaning
# the person who wrote the code, rather than whoever opened the pull request.
# This keeps credit correct when a maintainer relays a contribution for someone
# else.
#
# Skips when the commit author is the maintainer (rampyg) or a bot.
#
# Can also be run manually (workflow_dispatch) with a PR number to re-issue a
# certificate for an already-merged PR, for example after a transient failure.
#
# Setup: repository secrets VOUCH_PRIVATE_KEY (the contributor-issuer Ed25519
# JWK) and VOUCH_DID (did:web:vouch-protocol.com:contributors). The job is a
# safe no-op if they are not set. If contributors/delegation.json is present,
# the badge is chained back to the root authority automatically.
#
# Security note: uses pull_request_target with the default (base) checkout, so
# only trusted repository code runs. The contributor's PR code is never checked
# out or executed (allow-unsafe-pr-checkout is safe here because no PR ref is
# passed to checkout, so it takes the base branch).

on:
  pull_request_target:
    types: [closed]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "Merged PR number to (re)issue a certificate for"
        required: true
        type: string

permissions:
  pull-requests: write
  contents: write
  actions: write

jobs:
  mint:
    if: github.event.pull_request.merged == true || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Resolve contributor and PR metadata
        id: resolve
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          EVENT_PR: ${{ github.event.pull_request.number }}
          INPUT_PR: ${{ github.event.inputs.pr_number }}
        run: |
          # Works for both the merge event and a manual dispatch. Resolve the PR
          # number, confirm it is merged, then credit the person who wrote the
          # code: the most frequent commit author login that is neither the
          # maintainer nor a bot.
          PR_NUMBER="${EVENT_PR:-$INPUT_PR}"
          if [ -z "$PR_NUMBER" ]; then
            echo "::error::No PR number available."
            exit 1
          fi
          merged=$(gh api "repos/${REPO}/pulls/${PR_NUMBER}" --jq '.merged')
          if [ "$merged" != "true" ]; then
            echo "PR #${PR_NUMBER} is not merged; nothing to do."
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          login=$(gh api "repos/${REPO}/pulls/${PR_NUMBER}/commits?per_page=100" \
            --jq '[.[].author.login // empty]
                  | map(select(. != "rampyg" and (endswith("[bot]") | not)))
                  | (group_by(.) | max_by(length) | .[0]) // ""')
          if [ -z "$login" ]; then
            echo "No external contributor to credit (authored by the maintainer or bots)."
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          url=$(gh api "repos/${REPO}/pulls/${PR_NUMBER}" --jq '.html_url')
          title=$(gh api "repos/${REPO}/pulls/${PR_NUMBER}" --jq '.title')
          echo "Crediting contributor: ${login} for PR #${PR_NUMBER}"
          {
            echo "should_run=true"
            echo "login=${login}"
            echo "pr_number=${PR_NUMBER}"
            echo "pr_url=${url}"
            echo "pr_title<<CERT_EOF"
            echo "${title}"
            echo "CERT_EOF"
          } >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v7
        if: steps.resolve.outputs.should_run == 'true'
        with:
          # No PR ref is passed, so this checks out the trusted base branch.
          # v7 requires opting in to run at all under pull_request_target.
          allow-unsafe-pr-checkout: true

      - uses: actions/setup-python@v6
        if: steps.resolve.outputs.should_run == 'true'
        with:
          python-version: "3.11"

      - name: Install vouch
        if: steps.resolve.outputs.should_run == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Mint credential
        if: steps.resolve.outputs.should_run == 'true'
        env:
          VOUCH_PRIVATE_KEY: ${{ secrets.VOUCH_PRIVATE_KEY }}
          VOUCH_DID: ${{ secrets.VOUCH_DID }}
          PR_AUTHOR: ${{ steps.resolve.outputs.login }}
          PR_URL: ${{ steps.resolve.outputs.pr_url }}
          PR_NUMBER: ${{ steps.resolve.outputs.pr_number }}
          REPO: ${{ github.repository }}
        run: |
          if [ -z "$VOUCH_PRIVATE_KEY" ] || [ -z "$VOUCH_DID" ]; then
            echo "Issuer key not configured; skipping credential minting."
            exit 0
          fi
          PARENT=""
          if [ -f contributors/delegation.json ]; then
            PARENT="--parent contributors/delegation.json"
          fi
          python scripts/mint_contributor_credential.py \
            --subject "$PR_AUTHOR" \
            --pr-url "$PR_URL" \
            --pr-number "$PR_NUMBER" \
            --repo "$REPO" \
            $PARENT \
            --out credential.json

      - name: Verify the badge against the published DID document
        if: hashFiles('credential.json') != ''
        run: |
          python - <<'PY'
          import json, sys
          from vouch import Verifier
          cred = open("credential.json").read()
          doc = json.load(open("website/public/contributors/did.json"))
          pub = json.dumps(doc["verificationMethod"][0]["publicKeyJwk"])
          ok, _ = Verifier.verify(cred, public_key=pub)
          print("Badge self-verify against published DID:", ok)
          if not ok:
              print("::error::Minted badge does not verify against the published contributor DID."
                    " Check that VOUCH_PRIVATE_KEY and VOUCH_DID hold the contributor issuer key.")
              sys.exit(1)
          PY

      - name: Publish the certificate and list the contributor
        if: hashFiles('credential.json') != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_AUTHOR: ${{ steps.resolve.outputs.login }}
          PR_NUMBER: ${{ steps.resolve.outputs.pr_number }}
          PR_TITLE: ${{ steps.resolve.outputs.pr_title }}
        run: |
          # Publish the certificate page and the contributors list to main. This
          # runs after a merge, and several merges can happen close together, so
          # each attempt re-syncs to the latest main and rebuilds its files on
          # top of it. Rendering the page and adding the index entry are both
          # idempotent, so a retry after a rejected push is safe and concurrent
          # certificate jobs cannot overwrite each other.
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          published=0
          for attempt in 1 2 3 4 5 6; do
            git fetch --quiet origin main
            git reset --hard --quiet origin/main

            # Render the certificate page, served at /c/<login>/<pr>/.
            python scripts/render_contributor_cert.py \
              --credential credential.json \
              --login "$PR_AUTHOR" \
              --pr "$PR_NUMBER" \
              --title "$PR_TITLE" \
              --out "website/public/c/${PR_AUTHOR}/${PR_NUMBER}/index.html"
            # Add this contribution to the index list (idempotent per login+pr).
            python - <<'PY'
          import json, os
          path = "website/src/data/contributors.json"
          login = os.environ["PR_AUTHOR"]
          pr = int(os.environ["PR_NUMBER"])
          title = os.environ.get("PR_TITLE", "")
          data = json.load(open(path)) if os.path.exists(path) else []
          if not any(c.get("login") == login and c.get("pr") == pr for c in data):
              data.append({"login": login, "pr": pr, "title": title})
              with open(path, "w") as f:
                  json.dump(data, f, indent=2)
                  f.write("\n")
          PY
            git add "website/public/c/${PR_AUTHOR}/${PR_NUMBER}/index.html" website/src/data/contributors.json

            if git diff --cached --quiet; then
              echo "Certificate already present on main; nothing to publish."
              published=1
              break
            fi

            git commit -q -m "chore(contributors): certificate for @${PR_AUTHOR} (#${PR_NUMBER})"
            if git push origin HEAD:main; then
              published=1
              break
            fi
            echo "Push rejected because main advanced. Re-syncing and retrying (attempt ${attempt})."
            sleep $((2 ** attempt))
          done

          if [ "$published" -ne 1 ]; then
            echo "::error::Could not publish the contributor certificate for @${PR_AUTHOR} (#${PR_NUMBER}) after several attempts."
            exit 1
          fi

      - name: Deploy the website and wait for the certificate to publish
        if: hashFiles('credential.json') != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_AUTHOR: ${{ steps.resolve.outputs.login }}
          PR_NUMBER: ${{ steps.resolve.outputs.pr_number }}
        run: |
          # The certificate commit was pushed with GITHUB_TOKEN, which does not
          # trigger the on:push deploy. Dispatch the deploy and wait until the
          # rebuilt docs/ output on main actually contains the certificate page.
          # A deploy can race an older commit, so re-dispatch if the page does
          # not appear. This keeps the live site from briefly serving (and edge
          # caching) a 404 for a freshly minted certificate.
          CERT_PATH="docs/c/${PR_AUTHOR}/${PR_NUMBER}/index.html"
          published=0
          for attempt in 1 2 3 4 5; do
            echo "Deploy attempt ${attempt}: dispatching deploy-website.yml on main."
            gh workflow run deploy-website.yml --ref main || echo "Dispatch call failed; will retry."
            # Wait for the deploy to rebuild and commit docs/ back to main.
            for _ in $(seq 1 16); do
              sleep 15
              if gh api "repos/${REPO}/contents/${CERT_PATH}?ref=main" >/dev/null 2>&1; then
                published=1
                break
              fi
            done
            if [ "$published" -eq 1 ]; then
              echo "Certificate page is in the deployed docs/ output."
              break
            fi
            echo "Certificate not deployed yet after attempt ${attempt}; re-dispatching."
          done

          if [ "$published" -ne 1 ]; then
            echo "::warning::Deploy did not confirm the certificate page for @${PR_AUTHOR} (#${PR_NUMBER})."
            echo "It may still publish shortly; re-run this workflow with the PR number if needed."
            exit 0
          fi

          # Best effort: wait for the live page to serve, using a unique query
          # string to bypass any cached negative response at the edge.
          CERT_URL="https://vouch-protocol.com/c/${PR_AUTHOR}/${PR_NUMBER}/"
          for _ in $(seq 1 10); do
            code=$(curl -s -o /dev/null -w '%{http_code}' "${CERT_URL}?cb=${GITHUB_RUN_ID}-${RANDOM}" || echo 000)
            echo "Live check ${CERT_URL} -> ${code}"
            if [ "$code" = "200" ]; then break; fi
            sleep 15
          done

      - name: Congratulate the contributor
        if: hashFiles('credential.json') != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_AUTHOR: ${{ steps.resolve.outputs.login }}
          PR_NUMBER: ${{ steps.resolve.outputs.pr_number }}
          REPO: ${{ github.repository }}
          BADGE: "https://img.shields.io/badge/Vouch-Verified_Contributor-7C2D3A?style=for-the-badge&labelColor=2d2d2d"
          CERT_URL: "https://vouch-protocol.com/c/${{ steps.resolve.outputs.login }}/${{ steps.resolve.outputs.pr_number }}"
        run: |
          {
            echo "### Vouch Verified Contributor :sparkles:"
            echo ""
            echo "Thank you @${PR_AUTHOR}. This merged pull request earns a signed"
            echo "**Vouch Verified Contributor** certificate, chained to the project root authority."
            echo ""
            echo "[![Vouch Verified Contributor](${BADGE})](${CERT_URL})"
            echo ""
            echo "**Your certificate (download and share it):** ${CERT_URL}"
            echo ""
            echo "**Add the badge to your profile or site (optional):**"
            echo ""
            echo '```markdown'
            echo "[![Vouch Verified Contributor](${BADGE})](${CERT_URL})"
            echo '```'
            echo ""
            echo "<details><summary>Your Verifiable Credential (eddsa-jcs-2022)</summary>"
            echo ""
            echo '```json'
            cat credential.json
            echo ""
            echo '```'
            echo ""
            echo "</details>"
          } > comment.md
          gh pr comment "$PR_NUMBER" --repo "$REPO" --body-file comment.md
