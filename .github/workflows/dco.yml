name: DCO Check

on:
  pull_request:
    branches: [main]

jobs:
  dco:
    name: DCO Sign-off Check
    runs-on: ubuntu-latest
    # Skip DCO check for bot accounts
    if: github.actor != 'dependabot[bot]' && github.actor != 'github-actions[bot]'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Self-contained DCO check. Verifies every non-merge commit in the PR
      # carries a `Signed-off-by: Name <email>` trailer matching its author.
      # Implemented inline so it has no dependency on an external action.
      - name: Check DCO sign-off
        run: |
          base="origin/${{ github.base_ref }}"
          git fetch --quiet origin "${{ github.base_ref }}"
          fail=0
          while read -r sha; do
            [ -z "$sha" ] && continue
            author="$(git log -1 --format='%an <%ae>' "$sha")"
            expected="Signed-off-by: ${author}"
            if ! git log -1 --format='%B' "$sha" | grep -qxF "$expected"; then
              echo "::error::Commit ${sha} is not signed off by its author (${author})."
              echo "  Expected a trailer: ${expected}"
              fail=1
            fi
          done < <(git rev-list --no-merges "${base}..HEAD")
          if [ "$fail" -ne 0 ]; then
            echo ""
            echo "DCO check failed. Sign off each commit with: git commit -s"
            echo "(or amend existing commits: git rebase --signoff ${base})"
            exit 1
          fi
          echo "All commits are signed off. ✅"
