# fly.toml app configuration file generated for vouch-assistant on 2026-05-19T21:35:27Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'vouch-assistant'
primary_region = 'bom'

[build]

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024

# Persistent SQLite log file for interactions + feedback.
# Created via: flyctl volumes create vouch_data --region bom --size 1
[[mounts]]
  source = "vouch_data"
  destination = "/data"
